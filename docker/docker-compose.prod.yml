# Production overlay for mgi-link (Container & Deployment Hardening Standard v1).
#
#   MGI_LINK_IMAGE=ghcr.io/berntpopp/mgi-link@sha256:<digest> \
#   docker compose -f docker/docker-compose.yml -f docker/docker-compose.prod.yml up -d

services:
  mgi-link:
    build: !reset null
    image: ${MGI_LINK_IMAGE:?Set MGI_LINK_IMAGE to ghcr.io/berntpopp/mgi-link@sha256:<digest>}
    pull_policy: missing
    container_name: !reset null
    env_file: !reset []
    ports: !reset []
    expose:
      - "8000"
    environment:
      GF_HEALTHCHECK_HOST: localhost
      MGI_LINK_HOST: 0.0.0.0
      MGI_LINK_PORT: 8000
      MGI_LINK_TRANSPORT: unified
      MGI_LINK_MCP_PATH: /mcp
      MGI_LINK_LOG_LEVEL: INFO
      MGI_LINK_LOG_FORMAT: json
      MGI_LINK_ALLOWED_HOSTS: '["localhost","127.0.0.1","::1","mgi-link.genefoundry.org"]'
      MGI_LINK_DATA__DATA_DIR: /data
      MGI_LINK_DATA__AUTO_BOOTSTRAP: "true"
      MGI_LINK_DATA__REFRESH_ENABLED: "false"
    volumes: !override
      - mgi-data:/data
    read_only: true
    tmpfs: !override
      - /tmp:rw,noexec,nosuid,size=256m,mode=1777
    security_opt: !override
      - no-new-privileges:true
    cap_drop: !override
      - ALL
    init: true
    restart: on-failure
    pids_limit: !reset null
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
          pids: 256
    healthcheck: !override
      test: ["CMD", "sh", "-c", "curl -f -H \"Host: $${GF_HEALTHCHECK_HOST}\" http://localhost:8000/health"]
      interval: 20s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service=mgi-link,environment=production"
    networks: !override
      - default

  refresh: !reset null

volumes: !override
  mgi-data:
    name: mgi-link_mgi-data

networks: !override
  default:
    name: mgi-link_default
