name: mgi-link

services:
  mgi-link:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
      args:
        # Stamp build provenance into the image so get_server_capabilities/_meta
        # can report which build answered. Defaults keep an unset env harmless.
        MGI_LINK_GIT_SHA: ${MGI_LINK_GIT_SHA:-unknown}
        MGI_LINK_BUILT_AT: ${MGI_LINK_BUILT_AT:-}
    container_name: mgi-link
    ports:
      - "${MGI_LINK_HOST_PORT:-8000}:8000"
    env_file:
      - path: ../.env
        required: false
      - path: ../.env.docker
        required: false
    environment:
      MGI_LINK_HOST: 0.0.0.0
      MGI_LINK_PORT: 8000
      MGI_LINK_TRANSPORT: unified
      MGI_LINK_MCP_PATH: /mcp
      MGI_LINK_LOG_LEVEL: INFO
      MGI_LINK_LOG_FORMAT: json
      MGI_LINK_DATA__DATA_DIR: /app/data
      MGI_LINK_DATA__AUTO_BOOTSTRAP: "true"
      # Refresh is owned by cron (see docs/deployment.md). To refresh the running
      # container, run a host cron job:
      #   docker compose -f docker/docker-compose.yml exec mgi-link mgi-link-data refresh
      MGI_LINK_DATA__REFRESH_ENABLED: "false"
    volumes:
      # Persist the built ~73MB SQLite index across container restarts.
      - mgi-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - mgi-network

  # Optional: a one-shot refresh runner you can invoke from host cron, e.g.
  #   17 3 * * *  docker compose -f /path/docker/docker-compose.yml run --rm refresh
  refresh:
    profiles: ["tools"]
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
    entrypoint: ["mgi-link-data", "refresh"]
    environment:
      MGI_LINK_DATA__DATA_DIR: /app/data
    volumes:
      - mgi-data:/app/data
    networks:
      - mgi-network

volumes:
  mgi-data:
    driver: local

networks:
  mgi-network:
    driver: bridge
